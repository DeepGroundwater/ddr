repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: "mkdocs.*\\.yml$"
      - id: debug-statements

  - repo: local
    hooks:
      - id: ruff-check-all
        name: Ruff check and fix
        entry: uv run ruff check --config pyproject.toml --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format-all
        name: Ruff format
        entry: uv run ruff format --config pyproject.toml
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check-final
        name: Ruff check (Ensure fixes are addressed)
        entry: uv run ruff check --config pyproject.toml --output-format=github
        language: system
        types: [python]
        pass_filenames: true
